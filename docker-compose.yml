services:
  postgres:
    image: postgres:15-alpine
    container_name: rankpredictor-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rankpredictor
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rankpredictor-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
